# The name of the workflow as it will appear in the GitHub Actions tab
name: CI for Maman 11 (Ubuntu 24.04)

# Define when this workflow should run automatically
on:
  push:
    branches: [ main, master ] # Runs every time you push to these branches
    paths:
      - 'maman11/**'
      - '.github/workflows/maman11-ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'maman11/**'
      - '.github/workflows/maman11-ci.yml'

# Grant the GitHub Action bot permission to push changes back to your repository
permissions:
  contents: write

jobs:
  build-and-test:
    # Use the latest Ubuntu environment
    runs-on: ubuntu-24.04

    steps:
      # Step 1: Download your code onto the virtual machine
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install standard C development tools (like gcc and make)
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make diffutils valgrind

      # Step 3: Navigate to the correct folder, compile and test the code
      - name: Build Maman 11 Q1
        run: |
          cd maman11/remove_blanks 
          make
        # Move into the specific assignment folder before running make
                    
        # Q1 TEST 1: Standard text processing
        # Compares current output against the golden
        # result and checks for memory leaks.
          
          echo "Running Valgrind Memory Check & Test 1..."
          valgrind --leak-check=full --error-exitcode=1 ./remove_blanks < inputs/test1.txt > current_result1.txt
          echo "Verifying Output for Test 1..."
          diff outputs/result1.txt current_result1.txt
          
          echo "Running Valgrind Memory Check & Test 2..."
          valgrind --leak-check=full --error-exitcode=1 ./remove_blanks < inputs/test2.txt > current_result2.txt
          echo "Verifying Output for Test 2..."
          diff outputs/result2.txt current_result2.txt

          echo "Running Valgrind Memory Check & Test 3..."
          valgrind --leak-check=full --error-exitcode=1 ./remove_blanks < inputs/test3.txt > current_result3.txt
          echo "Verifying Output for Test 3..."
          diff outputs/result3.txt current_result3.txt

          echo "Running Valgrind Memory Check & Empty File Test..."
          valgrind --leak-check=full --error-exitcode=1 ./remove_blanks < inputs/empty.txt > current_error.txt
          echo "Verifying Output for Empty File Test..."
          diff outputs/error.txt current_error.txt

      - name: Build Maman 11 Q2
        run: |
          cd maman11/turn_on
          make    
        # Move into the specific assignment folder before running make
          
        # Q2 TEST 1: Standard text processing
        # Compares current output against the golden
        # result and checks for memory leaks.
          
          echo "Running Valgrind Memory Check & Test 1..."
          valgrind --leak-check=full --error-exitcode=1 ./turn_on < inputs/test1.txt > current_result1.txt
          echo "Verifying Output for Test 1..."
          diff outputs/result1.txt current_result1.txt
          
          echo "Running Valgrind Memory Check & Test 2..."
          valgrind --leak-check=full --error-exitcode=1 ./turn_on < inputs/test2.txt > current_result2.txt
          echo "Verifying Output for Test 2..."
          diff outputs/result2.txt current_result2.txt

          echo "Running Valgrind Memory Check & Test 3 (Invalid Input)..."
          valgrind --leak-check=full --error-exitcode=1 ./turn_on < inputs/test3.txt > current_result3.txt
          echo "Verifying Output for Test 3..."
          diff outputs/result3.txt current_result3.txt
