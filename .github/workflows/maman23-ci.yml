name: Maman 23 CI (Ubuntu 24.04)

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'maman23/**'
      - '.github/workflows/maman23-ci.yml'
  pull_request:
    branches:
      - master
      - main
    paths:
      - 'maman23/**'
      - '.github/workflows/maman23-ci.yml'

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make diffutils valgrind

      - name: Build Maman 23
        run: |
          cd maman23/seek
          echo "=== Compiling seek ==="
          make clean && make

      - name: Run Output Tests
        run: |
          cd maman23/seek
          
          # Execute the 6 definitive test scenarios
          ./seek 2 inputs/simple.in > outputs/result1.txt 2>&1 || true
          ./seek 2 inputs/boundary.in inputs/whitespace.in inputs/windows.in > outputs/result2.txt 2>&1 || true
          ./seek 10 inputs/boundary.in > outputs/result3.txt 2>&1 || true
          ./seek 5 inputs/empty.in inputs/short.in inputs/missing.in > outputs/result4.txt 2>&1 || true
          ./seek abc inputs/simple.in > outputs/result5.txt 2>&1 || true
          ./seek 5 > outputs/result6.txt 2>&1 || true
          
          # Assertions via diff checking
          echo "Checking Test 1 (Simple Success)..." && diff -w outputs/expected1.txt outputs/result1.txt
          echo "Checking Test 2 (Multi-File Whitespace Success)..." && diff -w outputs/expected2.txt outputs/result2.txt
          echo "Checking Test 3 (Exact Boundary End)..." && diff -w outputs/expected3.txt outputs/result3.txt
          echo "Checking Test 4 (Combined Non-Fatal Errors)..." && diff -w outputs/expected4.txt outputs/result4.txt
          echo "Checking Test 5 (Fatal Error: Non-numeric N)..." && diff -w outputs/expected5.txt outputs/result5.txt
          echo "Checking Test 6 (Fatal Error: Missing Files)..." && diff -w outputs/expected6.txt outputs/result6.txt
          echo "All 6 core verification configurations match perfectly!"

      - name: Run Valgrind Memory Checks
        run: |
          cd maman23/seek
          echo "=== Running Valgrind ==="
          valgrind --leak-check=full --error-exitcode=1 ./seek 2 inputs/simple.in > /dev/null 2>&1
          valgrind --leak-check=full --error-exitcode=1 ./seek 2 inputs/boundary.in inputs/whitespace.in inputs/windows.in > /dev/null 2>&1
          valgrind --leak-check=full --error-exitcode=1 ./seek 10 inputs/boundary.in > /dev/null 2>&1
          valgrind --leak-check=full --error-exitcode=1 ./seek 5 inputs/empty.in inputs/short.in inputs/missing.in > /dev/null 2>&1
          valgrind --leak-check=full ./seek abc inputs/simple.in > /dev/null 2>&1 || true
          valgrind --leak-check=full ./seek 5 > /dev/null 2>&1 || true
          echo "Zero memory leaks detected across all 6 validation states!"