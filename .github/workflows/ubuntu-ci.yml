# The name of the workflow as it will appear in the GitHub Actions tab
name: CI for Maman 11 (Ubuntu 24.04)

# Define when this workflow should run automatically
on:
  push:
    branches: [ main, master ] # Runs every time you push to these branches
    paths:
      - 'maman11/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'maman11/**'
      - '.github/workflows/**'

# Grant the GitHub Action bot permission to push changes back to your repository
permissions:
  contents: write

jobs:
  build-and-test:
    # Use the latest Ubuntu environment
    runs-on: ubuntu-24.04

    steps:
      # Step 1: Download your code onto the virtual machine
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install standard C development tools (like gcc and make)
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make diffutils

      # Step 3: Navigate to the correct folder and compile the code
      - name: Build Maman 11 Q1
        run: |
      - name: Build Maman 11 Q2
        run: |
          cd maman11/turn_on
          make    
          # Move into the specific assignment folder before running make
          
          # Later, you can add test execution here:
          # ./remove_blanks < inputs/test1.txt > outputs/result1.txt

      # Step 4: Commit the freshly compiled binary back to GitHub
      - name: Commit and push binary
        run: |
          # Configure the bot's identity for the commit
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Explicitly add the compiled binary from its new subfolder
          git add -f maman11/remove_blanks/remove_blanks
          
          # Safety check: Only push if the file actually changed.
          # If the binary is identical to the last run, this prevents the workflow from crashing.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update compiled remove_blanks binary" && git push)