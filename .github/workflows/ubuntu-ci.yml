name: CI for C Laboratory (Ubuntu 24.04)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build-and-test:
    # This matches the Ubuntu version in your Dev Container
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make

      - name: Build with Makefile
        run: |
          # This runs the 'all' target in your Makefile
          make
          # Ensure the binary is executable
          chmod +x m11

      - name: Run Program
        run: |
          # Run the program and show output in the Action logs
          ./m11